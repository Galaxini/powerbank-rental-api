version: '3.9'

services:
  postgres:
    image: postgres:15
    container_name: powerbank_postgres
    restart: always
    environment:
      POSTGRES_DB: powerbank
      POSTGRES_USER: powerbank
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: powerbank_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
